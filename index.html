<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .player-wrapper {
      position: relative;
      width: 100%;
      max-width: 960px;
      padding-top: 56.25%;
    }
    iframe {
      border: 0;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #ad-overlay {
      position: absolute;
      bottom: 60px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      pointer-events: none;
      z-index: 10;
    }
    #ad-timer {
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 3px;
    }
    #skip-btn {
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      padding: 8px 16px;
      border: 1px solid #fff;
      border-radius: 3px;
      cursor: pointer;
      pointer-events: all;
      display: none;
    }
    #skip-btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="player-wrapper">
    <iframe
      id="player"
      src="https://player.mediadelivery.net/embed/634629/05884145-e4cf-4dea-98dd-3c85fc529182?autoplay=true&loop=false&muted=true&preload=true&responsive=true"
      loading="lazy"
      allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;"
      allowfullscreen="true">
    </iframe>
    <div id="ad-overlay">
      <div id="ad-timer">Ad: 15s</div>
      <button id="skip-btn" onclick="skipAd()">Skip Ad &#x276F;</button>
    </div>
  </div>

  <script>
    const AD_DURATION = 15;
    const timerEl = document.getElementById('ad-timer');
    const skipBtn = document.getElementById('skip-btn');
    const overlay = document.getElementById('ad-overlay');
    const playerEl = document.getElementById('player');

    let remaining = AD_DURATION;
    let adActive = true;

    const interval = setInterval(() => {
      if (!adActive) return;
      remaining--;
      if (remaining > 0) {
        timerEl.textContent = 'Ad: ' + remaining + 's';
      } else {
        timerEl.style.display = 'none';
        skipBtn.style.display = 'block';
        clearInterval(interval);
      }
    }, 1000);

    function skipAd() {
      adActive = false;
      overlay.style.display = 'none';
      // Reload player without ad tag to skip
      const src = playerEl.src;
      playerEl.src = src.includes('?') ? src + '&skipAd=1' : src + '?skipAd=1';
    }
  </script>
</body>
</html>
