<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV App</title>

  <!-- Video.js -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <!-- Google IMA SDK (must load before videojs-ima) -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

  <!-- videojs-contrib-ads (required by videojs-ima) -->
  <link href="https://unpkg.com/videojs-contrib-ads@6.9.0/dist/videojs.ads.css" rel="stylesheet">
  <script src="https://unpkg.com/videojs-contrib-ads@6.9.0/dist/videojs.ads.min.js"></script>

  <!-- videojs-ima -->
  <link href="https://unpkg.com/videojs-ima@2.6.0/dist/videojs.ima.css" rel="stylesheet">
  <script src="https://unpkg.com/videojs-ima@2.6.0/dist/videojs.ima.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .player-wrapper {
      width: 100%;
      max-width: 960px;
    }

    /* Override Video.js to fill wrapper */
    .video-js {
      width: 100% !important;
      aspect-ratio: 16/9;
      height: auto !important;
    }

    /* Custom skip button */
    #custom-skip {
      display: none;
      position: absolute;
      bottom: 60px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      padding: 8px 16px;
      border: 1px solid #fff;
      border-radius: 3px;
      cursor: pointer;
    }
    #custom-skip:hover { background: rgba(255,255,255,0.2); }

    /* Ad countdown label */
    #ad-countdown {
      display: none;
      position: absolute;
      bottom: 60px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* Ad label top-left */
    #ad-label {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 9999;
      background: rgba(255,165,0,0.85);
      color: #000;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 3px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="player-wrapper" style="position:relative;">

    <video id="main-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
      <!-- 
        Replace the src below with your HLS (.m3u8) or MP4 URL.
        HLS is recommended for TV (adaptive bitrate).
        Example HLS:  https://your-cdn.com/stream/playlist.m3u8
        Example MP4:  https://your-cdn.com/video/main.mp4
      -->
      <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
    </video>

    <div id="ad-label">AD</div>
    <div id="ad-countdown"></div>
    <button id="custom-skip">Skip Ad &#x276F;</button>

  </div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────────────────────
    const SKIP_AFTER_SECONDS = 10;   // skip button appears after this many seconds
    const MIDROLL_AT_SECOND  = 60;   // mid-roll plays at this second of the main video

    const BASE = window.location.origin;
    const VAST_PREROLL  = BASE + '/vast-pre.xml';
    const VAST_MIDROLL  = BASE + '/vast-mid.xml';
    const VAST_POSTROLL = BASE + '/vast-post.xml';
    // ───────────────────────────────────────────────────────────────────────────

    const player = videojs('main-player', {
      autoplay: true,
      muted: true,
      controls: true,
      fluid: true,
      html5: {
        vhs: { overrideNative: true },
        nativeAudioTracks: false,
        nativeVideoTracks: false
      }
    });

    const skipBtn      = document.getElementById('custom-skip');
    const countdownEl  = document.getElementById('ad-countdown');
    const adLabel      = document.getElementById('ad-label');

    let adPlaying      = false;
    let skipUnlocked   = false;
    let countdownTimer = null;
    let midrollDone    = false;
    let postrollDone   = false;

    // ─── IMA plugin init (inside ready to ensure plugin is registered) ─────────
    player.ready(function() {
      player.ima({
        adTagUrl: VAST_PREROLL,
        disableFlashAds: true,
        showControlsForJSAds: false
      });
    });

    // ─── Ad started ───────────────────────────────────────────────────────────
    player.on('ads-ad-started', () => {
      adPlaying    = true;
      skipUnlocked = false;
      adLabel.style.display    = 'block';
      countdownEl.style.display = 'block';
      skipBtn.style.display    = 'none';

      let elapsed = 0;
      countdownEl.textContent = 'Skip in ' + SKIP_AFTER_SECONDS + 's';

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        elapsed++;
        const remaining = SKIP_AFTER_SECONDS - elapsed;
        if (remaining > 0) {
          countdownEl.textContent = 'Skip in ' + remaining + 's';
        } else {
          clearInterval(countdownTimer);
          countdownEl.style.display = 'none';
          skipBtn.style.display     = 'block';
          skipUnlocked = true;
        }
      }, 1000);
    });

    // ─── Ad ended ─────────────────────────────────────────────────────────────
    player.on('ads-ad-ended', resetAdUI);
    player.on('adserror',     resetAdUI);

    function resetAdUI() {
      adPlaying = false;
      clearInterval(countdownTimer);
      adLabel.style.display     = 'none';
      countdownEl.style.display = 'none';
      skipBtn.style.display     = 'none';
    }

    // ─── Skip button ──────────────────────────────────────────────────────────
    skipBtn.addEventListener('click', () => {
      if (!skipUnlocked) return;
      try {
        player.ima.adContainerDiv.style.display = 'none';
        player.ima.adsManager.stop();
      } catch (e) { /* IMA not ready */ }
      resetAdUI();
      player.play();
    });

    // ─── Mid-roll trigger ─────────────────────────────────────────────────────
    player.on('timeupdate', () => {
      if (midrollDone || adPlaying) return;
      if (player.currentTime() >= MIDROLL_AT_SECOND) {
        midrollDone = true;
        player.ima.changeAdTag(VAST_MIDROLL);
        player.ima.requestAds();
      }
    });

    // ─── Post-roll trigger ────────────────────────────────────────────────────
    player.on('ended', () => {
      if (postrollDone) return;
      postrollDone = true;
      player.ima.changeAdTag(VAST_POSTROLL);
      player.ima.requestAds();
    });
  </script>
</body>
</html>
